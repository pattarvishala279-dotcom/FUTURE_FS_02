<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini CRM</title>
<style>
  body { font-family: Arial; padding: 20px; }
  input, textarea { display: block; margin: 5px 0; width: 300px; }
  table, th, td { border: 1px solid black; border-collapse: collapse; margin-top: 20px; }
  th, td { padding: 5px; }
</style>
</head>
<body>
<h2>Add Lead</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="source" placeholder="Source">
<textarea id="notes" placeholder="Notes"></textarea>
<button type="button" onclick="addLead()">Add Lead</button>

<h2>Leads List</h2>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Source</th>
      <th>Status</th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody id="leadsTable"></tbody>
</table>

<script>
const API_URL = "http://localhost:5000/api/leads";

// Load leads on page load
document.addEventListener("DOMContentLoaded", loadLeads);

async function addLead() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const source = document.getElementById("source").value.trim();
  const notes = document.getElementById("notes").value.trim();

  if (!name || !email || !source) {
    alert("Please fill all required fields");
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, source, notes })
    });
    await res.json();

    // Clear inputs
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("source").value = "";
    document.getElementById("notes").value = "";

    loadLeads();
  } catch (err) {
    alert("Failed to add lead");
    console.error(err);
  }
}

async function loadLeads() {
  try {
    const res = await fetch(API_URL);
    const leads = await res.json();

    const table = document.getElementById("leadsTable");
    table.innerHTML = "";

    leads.forEach(lead => {
      table.innerHTML += `
        <tr>
          <td>${lead.name}</td>
          <td>${lead.email}</td>
          <td>${lead.source}</td>
          <td>${lead.status}</td>
          <td>${lead.notes || ""}</td>
        </tr>
      `;
    });
  } catch (err) {
    console.error("Error loading leads:", err);
  }
}
</script>
</body>
</html>
